{% extends "base.html" %}
{% block title %}Scoreboard{% endblock %}
{% block head %}
{{ super() }}
<script src="{{ url_for('static', filename='vendor/js/echarts.min.js') }}"></script>
{% endblock %}
{% block main_attrs %}aria-label="Scoreboard" tabindex="-1"{% endblock %}
{% block content %}
<div class="container md-page">
    <h1 class="sr-only">Scoreboard</h1>
    <div id="scoreboard_status" role="status" aria-live="polite" aria-atomic="true" class="sr-only"></div>
    <div id="scoreboard_alert" role="alert" aria-live="assertive" aria-atomic="true" class="sr-only"></div>

    <h2 class="sr-only">Total Scores Bar Chart</h2>
    <div id="teamBar" style="width: 100%; height:400px;" role="img" aria-label="Bar chart showing total scores by team" tabindex="0" aria-describedby="teamBarTable"></div>
    <div id="teamBarTable" class="sr-only"></div>
    <hr>
    <h2 class="sr-only">Service Scores Line Chart</h2>
    <div id="teamLine" style="width: 100%; height:400px;" role="img" aria-label="Line chart showing service scores over time by team" tabindex="0" aria-describedby="teamLineTable"></div>
    <div id="teamLineTable" class="sr-only"></div>
    <script>
        // Bar chart for all teams
        var teamBarChart = echarts.init(document.getElementById('teamBar'));
        teamBarChart.showLoading();

        // Handle window resize to make charts responsive
        window.addEventListener('resize', function() {
            teamBarChart.resize();
        });

        const serviceScores = [];
        const injectScores = [];
        const slaPenalties = [];
        let slaEnabled = false;

        $.getJSON('/api/scoreboard/get_bar_data')
            .done(function (data) {
                slaEnabled = data.sla_enabled || false;

                // Service Scores
                echarts.util.each(data.service_scores, function (score, index) {
                    serviceScores.push({
                        value: score,
                    });
                });
                // Inject Scores
                echarts.util.each(data.inject_scores, function (score, index) {
                    injectScores.push({
                        value: score,
                    });
                });
                // SLA Penalties (as negative values for visual effect)
                if (slaEnabled && data.sla_penalties) {
                    echarts.util.each(data.sla_penalties, function (penalty, index) {
                        slaPenalties.push({
                            value: -Math.abs(parseInt(penalty) || 0),
                            itemStyle: {
                                color: '#c23531'
                            }
                        });
                    });
                }

                // Build series array
                var seriesData = [
                    {
                        name: 'Services',
                        data: serviceScores,
                        type: 'bar',
                        stack: 'positive',
                    },
                    {
                        name: 'Injects',
                        data: injectScores,
                        type: 'bar',
                        stack: 'positive',
                    }
                ];

                // Add SLA penalties series when enabled
                if (slaEnabled && slaPenalties.length > 0) {
                    seriesData.push({
                        name: 'SLA Penalties',
                        data: slaPenalties,
                        type: 'bar',
                        stack: 'negative',
                        itemStyle: {
                            color: '#c23531'
                        }
                    });
                }

                teamBarChart.hideLoading();
                buildBarTable(data);
                teamBarChart.setOption({
                    title: {
                        text: slaEnabled ? 'Total Scores (with SLA Penalties)' : 'Total Scores',
                        x: 'center',
                    },
                    tooltip: {
                        trigger: 'axis',
                        formatter: function(params) {
                            var result = params[0].name + '<br/>';
                            var total = 0;
                            params.forEach(function(item) {
                                var value = Math.abs(item.value) || 0;
                                var sign = item.seriesName === 'SLA Penalties' ? '-' : '+';
                                if (item.seriesName === 'SLA Penalties') {
                                    result += item.marker + item.seriesName + ': <span style="color:#c23531">-' + value + '</span><br/>';
                                    total -= value;
                                } else {
                                    result += item.marker + item.seriesName + ': ' + value + '<br/>';
                                    total += value;
                                }
                            });
                            result += '<strong>Adjusted Total: ' + total + '</strong>';
                            return result;
                        }
                    },
                    legend: {
                        data: slaEnabled ? ['Services', 'Injects', 'SLA Penalties'] : ['Services', 'Injects'],
                        top: 30
                    },
                    grid: {
                        left: '3%',
                        right: '4%',
                        bottom: '3%',
                        top: '15%',
                        containLabel: true
                    },
                    xAxis: [
                        {
                            type: 'category',
                            data: data.labels,
                        }
                    ],
                    yAxis: {
                        type: 'value'
                    },
                    series: seriesData
                });
            })
            .fail(function(jqXHR, textStatus, errorThrown) {
                teamBarChart.hideLoading();
                console.error('Failed to load scoreboard data:', textStatus, errorThrown);
                $('#scoreboard_alert').text('');
                setTimeout(function () { $('#scoreboard_alert').text('Failed to load bar chart data.'); }, 100);
            });

        function buildBarTable(data) {
            var html = '<table><caption>Total Scores by Team</caption>';
            html += '<thead><tr><th scope="col">Team</th><th scope="col">Services</th><th scope="col">Injects</th>';
            if (data.sla_enabled && data.sla_penalties) {
                html += '<th scope="col">SLA Penalties</th><th scope="col">Adjusted Total</th>';
            } else {
                html += '<th scope="col">Total</th>';
            }
            html += '</tr></thead><tbody>';
            for (var i = 0; i < data.labels.length; i++) {
                var svc = parseInt(data.service_scores[i]) || 0;
                var inj = parseInt(data.inject_scores[i]) || 0;
                var total = svc + inj;
                html += '<tr><th scope="row">' + data.labels[i] + '</th>';
                html += '<td>' + svc + '</td><td>' + inj + '</td>';
                if (data.sla_enabled && data.sla_penalties) {
                    var penalty = Math.abs(parseInt(data.sla_penalties[i]) || 0);
                    total -= penalty;
                    html += '<td>-' + penalty + '</td><td>' + total + '</td>';
                } else {
                    html += '<td>' + total + '</td>';
                }
                html += '</tr>';
            }
            html += '</tbody></table>';
            $('#teamBarTable').html(html);
        }

        // Update chart every 30 seconds
        setInterval(function () {
            const serviceScores = [];
            const injectScores = [];
            const slaPenalties = [];
            $.get('/api/scoreboard/get_bar_data').done(function (data) {
                const slaEnabled = data.sla_enabled || false;

                // Service Scores
                echarts.util.each(data.service_scores, function (score, index) {
                    serviceScores.push({
                        value: score,
                    });
                });
                // Inject Scores
                echarts.util.each(data.inject_scores, function (score, index) {
                    injectScores.push({
                        value: score,
                    });
                });
                // SLA Penalties
                if (slaEnabled && data.sla_penalties) {
                    echarts.util.each(data.sla_penalties, function (penalty, index) {
                        slaPenalties.push({
                            value: -Math.abs(parseInt(penalty) || 0),
                            itemStyle: {
                                color: '#c23531'
                            }
                        });
                    });
                }

                var seriesUpdate = [
                    { data: serviceScores },
                    { data: injectScores }
                ];
                if (slaEnabled && slaPenalties.length > 0) {
                    seriesUpdate.push({ data: slaPenalties });
                }

                buildBarTable(data);
                teamBarChart.setOption({
                    title: {
                        text: slaEnabled ? 'Total Scores (with SLA Penalties)' : 'Total Scores',
                    },
                    series: seriesUpdate
                });
                $('#scoreboard_status').text('');
                setTimeout(function () { $('#scoreboard_status').text('Scoreboard charts updated.'); }, 100);
            });
        }, 30000);
    </script>
    <script>
        // Line chart for all teams
        var teamLineChart = echarts.init(document.getElementById('teamLine'));
        teamLineChart.showLoading();

        // Handle window resize to make charts responsive
        window.addEventListener('resize', function() {
            teamLineChart.resize();
        });

        const seriesList = [];
        $.getJSON('/api/scoreboard/get_line_data')
            .done(function (data) {
                echarts.util.each(data.team, function (team) {
                    seriesList.push({
                        name: team.name,
                        type: 'line',
                        data: team.scores,
                        itemStyle: {
                            color: team.color
                        },
                        showSymbol: false
                    });
                });
                teamLineChart.hideLoading();
                buildLineTable(data);
                teamLineChart.setOption({
                    title: {
                        text: 'Service Scores',
                        x: 'center',
                    },
                    tooltip: {
                        trigger: 'axis'
                    },
                    grid: {
                        left: '3%',
                        right: '4%',
                        bottom: '3%',
                        containLabel: true
                    },
                    xAxis: {
                        type: 'category',
                        boundaryGap: false,
                        data: data.rounds
                    },
                    yAxis: {
                        type: 'value'
                    },
                    series: seriesList,
                    // label: {
                    //     show: true
                    // },
                });
            })
            .fail(function(jqXHR, textStatus, errorThrown) {
                teamLineChart.hideLoading();
                console.error('Failed to load line chart data:', textStatus, errorThrown);
                $('#scoreboard_alert').text('');
                setTimeout(function () { $('#scoreboard_alert').text('Failed to load line chart data.'); }, 100);
            });

        function buildLineTable(data) {
            var totalRounds = data.rounds ? data.rounds.length : 0;
            var recentCount = Math.min(5, totalRounds);
            var startIdx = totalRounds - recentCount;
            var html = '<table><caption>Service Scores Over Time by Team (last ' + recentCount + ' of ' + totalRounds + ' rounds)</caption>';
            html += '<thead><tr><th scope="col">Team</th>';
            for (var r = startIdx; r < totalRounds; r++) {
                html += '<th scope="col">Round ' + data.rounds[r] + '</th>';
            }
            html += '</tr></thead><tbody>';
            echarts.util.each(data.team, function (team) {
                html += '<tr><th scope="row">' + team.name + '</th>';
                for (var r = startIdx; r < totalRounds; r++) {
                    var score = r < team.scores.length ? team.scores[r] : 'N/A';
                    html += '<td>' + score + '</td>';
                }
                html += '</tr>';
            });
            html += '</tbody></table>';
            $('#teamLineTable').html(html);
        }

        // Update chart every 30 seconds
        setInterval(function () {
            const seriesList = [];
            $.get('/api/scoreboard/get_line_data').done(function (data) {
                echarts.util.each(data.team, function (team) {
                    seriesList.push({
                        name: team.name,
                        type: 'line',
                        data: team.scores,
                    });
                });
                buildLineTable(data);
                teamLineChart.setOption({
                    series: seriesList,
                });
            });
        }, 30000);
    </script>
</div>
{% endblock %}
